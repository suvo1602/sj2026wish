<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Deleted</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(-45deg,#0f0f0f,#1a1a1a,#2b2b2b,#111);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
    color:#fff;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    z-index:2;
}

.icon{
    font-size:90px;
    color:#ff3b3b;
    animation:shake 2s infinite;
}

@keyframes shake{
    0%,100%{transform:rotate(0deg);}
    20%{transform:rotate(-8deg);}
    40%{transform:rotate(8deg);}
    60%{transform:rotate(-5deg);}
    80%{transform:rotate(5deg);}
}

h1{
    margin-top:20px;
    font-size:42px;
}

p{
    margin-top:15px;
    font-size:20px;
    color:#ddd;
}

.small{
    margin-top:30px;
    font-size:15px;
    color:#999;
    
   .name{
    color:#ffcc00 !important;
    font-weight:900;
    font-size:1.2em;
    text-transform:uppercase;
    animation:glow 1s infinite alternate;
}

@keyframes glow{
    from{
        color:#ffcc00;
        text-shadow:0 0 10px #ffcc00;
    }
    to{
        color:#ffffff;
        text-shadow:0 0 15px #ffcc00,0 0 30px #ffcc00;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="icon">
        <i class="fas fa-trash-alt"></i>
    </div>

    <h1>Website Deleted</h1>

    <p>This website has been deleted by <span class="name">Subhadip</span>.</p>

<p>For more information, please contact <span class="name">Subhadip</span>.</p>

    <div class="small">© 2026 Subhadip</div>
</div>

</body>
</html>
